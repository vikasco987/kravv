// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
  configurations.all {
    resolutionStrategy {
      dependencySubstitution {
        substitute module('com.android.support:support-compat') using module('androidx.core:core:1.16.0')
        substitute module('com.android.support:versionedparcelable') using module('androidx.versionedparcelable:versionedparcelable:1.1.1')
        substitute module('com.android.support:support-v4') using module('androidx.legacy:legacy-support-v4:1.0.0')
        substitute module('com.android.support:appcompat-v7') using module('androidx.appcompat:appcompat:1.7.0')
      }
      eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'com.android.support') {
          if (details.requested.name == 'support-v4') {
            details.useTarget 'androidx.legacy:legacy-support-v4:1.0.0'
          } else if (details.requested.name == 'support-compat') {
            details.useTarget 'androidx.core:core:1.16.0'
          } else if (details.requested.name == 'versionedparcelable') {
            details.useTarget 'androidx.versionedparcelable:versionedparcelable:1.1.1'
          } else {
             // For any other com.android.support library, try to redirect to its potential (though not guaranteed here) AndroidX counterpart or at least let Jetifier handle it if possible.
             // But force substitution is better.
          }
        }
      }
    }
    // Global exclusion for the old support library group to prevent them from slipping in
    exclude group: 'com.android.support'
    exclude group: 'com.android.support.test'
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
